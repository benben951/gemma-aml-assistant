version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: gemma-aml-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: gemma-aml-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - GEMMA_BACKEND=${GEMMA_BACKEND:-ollama}
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma-4-26b-a4b}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-5}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app:/app/app
      - ./src:/app/src

volumes:
  qdrant_storage:
    driver: local