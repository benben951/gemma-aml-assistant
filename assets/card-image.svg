<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Accent line -->
  <rect x="0" y="100" width="1280" height="4" fill="url(#accent)"/>
  
  <!-- Main title -->
  <text x="640" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">
    AML Compliance Assistant
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="28" fill="#8892b0" text-anchor="middle">
    Offline AI for Financial Regulatory Knowledge
  </text>
  
  <!-- Key features -->
  <g font-family="Arial, sans-serif" font-size="18" fill="#4a90d9">
    <text x="200" y="480">🔒 Offline Deployment</text>
    <text x="440" y="480">💡 Explainable AI</text>
    <text x="680" y="480">📚 Source Citations</text>
    <text x="920" y="480">✅ Audit Trail</text>
  </g>
  
  <!-- Track badge -->
  <rect x="480" y="550" width="320" height="50" rx="25" fill="url(#accent)" opacity="0.9"/>
  <text x="640" y="585" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle">
    Safety &amp; Trust Track
  </text>
  
  <!-- Bottom info -->
  <text x="640" y="680" font-family="Arial, sans-serif" font-size="14" fill="#8892b0" text-anchor="middle">
    Gemma 4 Good Hackathon | Powered by Gemma 4
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="300" r="80" fill="#4a90d9" opacity="0.1"/>
  <circle cx="1180" cy="400" r="100" fill="#667eea" opacity="0.1"/>
</svg>